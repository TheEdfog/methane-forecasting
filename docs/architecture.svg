<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="306"
    viewBox="0 0 1200 306" role="img" aria-labelledby="diagram-title diagram-description">
    <title id="diagram-title">Пайплайн прогнозирования концентрации метана</title>
    <desc id="diagram-description">Данные датчиков проходят проверку, хронологическую подготовку, сравнение модели с baseline и сохранение артефактов.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.08"/>
      </filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
        orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
      </marker>
      <style>
        text { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0F172A; }
        .label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; fill: #64748B; }
        .title { font-size: 19px; font-weight: 600; }
        .detail { font-size: 15px; fill: #475569; }
        .step { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
        .arrow { fill: none; stroke: #64748B; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .edge-label { font-size: 13px; font-weight: 500; fill: #64748B; }
        .lane-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; fill: #475569; }
      </style>
    </defs>
    <rect x="1" y="1" width="1198" height="304" rx="24"
      fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M 290 153 L 330 153" class="arrow" marker-end="url(#arrow)"/><path d="M 580 153 L 620 153" class="arrow" marker-end="url(#arrow)"/><path d="M 870 153 L 910 153" class="arrow" marker-end="url(#arrow)"/>
    <g>
      <rect x="40" y="82" width="250" height="142" rx="16"
        fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="68" cy="110" r="14" fill="#2563EB"/>
         <text x="68" y="115" class="step" text-anchor="middle">1</text>
      <text x="92" y="112" class="label">DATA</text>
      <text x="64" y="147" class="title" text-anchor="start"><tspan x="64" dy="0">Данные датчиков</tspan></text>
      <text x="64" y="183" class="detail" text-anchor="start"><tspan x="64" dy="0">Проверка и сортировка</tspan></text>
    </g>
    <g>
      <rect x="330" y="82" width="250" height="142" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="358" cy="110" r="14" fill="#64748B"/>
         <text x="358" y="115" class="step" text-anchor="middle">2</text>
      <text x="382" y="112" class="label">FEATURES</text>
      <text x="354" y="147" class="title" text-anchor="start"><tspan x="354" dy="0">Признаки без утечки</tspan></text>
      <text x="354" y="183" class="detail" text-anchor="start"><tspan x="354" dy="0">Chronological split</tspan></text>
    </g>
    <g>
      <rect x="620" y="82" width="250" height="142" rx="16"
        fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="648" cy="110" r="14" fill="#7C3AED"/>
         <text x="648" y="115" class="step" text-anchor="middle">3</text>
      <text x="672" y="112" class="label">MODELS</text>
      <text x="644" y="147" class="title" text-anchor="start"><tspan x="644" dy="0">Model vs baseline</tspan></text>
      <text x="644" y="183" class="detail" text-anchor="start"><tspan x="644" dy="0">Gradient Boosting</tspan></text>
    </g>
    <g>
      <rect x="910" y="82" width="250" height="142" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="938" cy="110" r="14" fill="#059669"/>
         <text x="938" y="115" class="step" text-anchor="middle">4</text>
      <text x="962" y="112" class="label">OUTPUT</text>
      <text x="934" y="147" class="title" text-anchor="start"><tspan x="934" dy="0">Метрики и артефакты</tspan></text>
      <text x="934" y="183" class="detail" text-anchor="start"><tspan x="934" dy="0">Model + JSON report</tspan></text>
    </g>
  </svg>